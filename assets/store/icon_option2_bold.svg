<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B35"/>
      <stop offset="50%" style="stop-color:#F72585"/>
      <stop offset="100%" style="stop-color:#7209B7"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffecd2"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#fce4ec"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="rgba(0,0,0,0.25)"/>
    </filter>
    <filter id="shadow2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(0,0,0,0.2)"/>
    </filter>
  </defs>

  <!-- Bold gradient background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="420" cy="80" r="80" fill="rgba(255,255,255,0.08)"/>
  <circle cx="80" cy="440" r="100" fill="rgba(0,0,0,0.1)"/>
  <circle cx="420" cy="80" r="50" fill="rgba(255,255,255,0.06)"/>

  <!-- Bottom card (rotated right) -->
  <g transform="translate(256,272) rotate(12) translate(-95,-118)" filter="url(#shadow2)">
    <rect width="190" height="236" rx="18" fill="rgba(255,255,255,0.35)"/>
    <rect x="0" y="0" width="8" height="236" rx="4" fill="#F72585"/>
    <rect x="24" y="44" width="140" height="8" rx="4" fill="rgba(247,37,133,0.3)"/>
    <rect x="24" y="64" width="110" height="8" rx="4" fill="rgba(247,37,133,0.2)"/>
    <rect x="24" y="84" width="125" height="8" rx="4" fill="rgba(247,37,133,0.15)"/>
  </g>

  <!-- Back card (rotated left) -->
  <g transform="translate(256,272) rotate(-10) translate(-95,-118)" filter="url(#shadow2)">
    <rect width="190" height="236" rx="18" fill="rgba(255,255,255,0.25)"/>
    <rect x="0" y="0" width="8" height="236" rx="4" fill="#7209B7"/>
  </g>

  <!-- Main front card -->
  <g transform="translate(161,154)" filter="url(#cardShadow)">
    <rect width="190" height="236" rx="18" fill="url(#card1)"/>
    <!-- Orange top accent bar -->
    <rect x="0" y="0" width="190" height="10" rx="9" fill="#FF6B35"/>
    <rect x="90" y="0" width="100" height="10" rx="0" fill="#FF6B35"/>
    <rect x="90" y="5" width="100" height="5" rx="0" fill="#F72585"/>
    <!-- Pencil icon area -->
    <rect x="20" y="30" width="36" height="36" rx="10" fill="#FF6B35"/>
    <text x="38" y="53" text-anchor="middle" font-size="20" fill="white">✏</text>
    <!-- Note lines -->
    <rect x="20" y="84" width="150" height="8" rx="4" fill="#FFD6C0"/>
    <rect x="20" y="104" width="120" height="8" rx="4" fill="#FFD6C0"/>
    <rect x="20" y="124" width="138" height="8" rx="4" fill="#FFD6C0"/>
    <!-- Divider -->
    <rect x="20" y="148" width="150" height="1.5" rx="1" fill="#FFB3A0" opacity="0.6"/>
    <!-- Checklist items -->
    <rect x="20" y="162" width="16" height="16" rx="5" fill="#F72585"/>
    <polyline points="23,170 27,174 35,165" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="44" y="165" width="100" height="7" rx="3.5" fill="#FFB3A0"/>
    <rect x="20" y="188" width="16" height="16" rx="5" fill="none" stroke="#FFB3A0" stroke-width="2"/>
    <rect x="44" y="191" width="80" height="7" rx="3.5" fill="#FFD6C0"/>
    <rect x="20" y="214" width="16" height="16" rx="5" fill="none" stroke="#FFB3A0" stroke-width="2"/>
    <rect x="44" y="217" width="110" height="7" rx="3.5" fill="#FFD6C0"/>
  </g>

  <!-- Bold S letter stamp (bottom right) -->
  <circle cx="368" cy="368" r="42" fill="#7209B7" filter="url(#shadow2)"/>
  <circle cx="368" cy="368" r="38" fill="url(#bg)"/>
  <text x="368" y="382" text-anchor="middle" font-size="42" font-weight="900"
        font-family="Arial Black, sans-serif" fill="white">S</text>
</svg>
