<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient: purple to magenta -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <!-- Shine gradient on note card -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f3e8ff;stop-opacity:1" />
    </linearGradient>
    <!-- Mic gradient -->
    <linearGradient id="micGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06B6D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#00000033"/>
    </filter>
  </defs>

  <!-- Rounded background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Subtle inner glow ring -->
  <rect width="512" height="512" rx="108" ry="108"
        fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="3"/>

  <!-- Back note card (slightly offset, purple tint) -->
  <rect x="148" y="118" width="240" height="296" rx="24" ry="24"
        fill="rgba(255,255,255,0.18)" filter="url(#shadow)"/>

  <!-- Main note card -->
  <rect x="124" y="98" width="240" height="296" rx="24" ry="24"
        fill="url(#cardGrad)" filter="url(#shadow)"/>

  <!-- Note lines -->
  <rect x="156" y="158" width="176" height="10" rx="5" fill="#E9D5FF"/>
  <rect x="156" y="184" width="176" height="10" rx="5" fill="#E9D5FF"/>
  <rect x="156" y="210" width="140" height="10" rx="5" fill="#E9D5FF"/>

  <!-- Divider -->
  <rect x="156" y="238" width="176" height="1.5" rx="1" fill="#DDD6FE" opacity="0.7"/>

  <!-- Checklist rows -->
  <!-- Row 1 checked -->
  <rect x="156" y="256" width="18" height="18" rx="5"
        fill="#7C3AED"/>
  <polyline points="159,265 163,270 172,260"
            fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="182" y="260" width="110" height="8" rx="4" fill="#C4B5FD"/>

  <!-- Row 2 unchecked -->
  <rect x="156" y="284" width="18" height="18" rx="5"
        fill="none" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="182" y="288" width="130" height="8" rx="4" fill="#E9D5FF"/>

  <!-- Row 3 unchecked -->
  <rect x="156" y="312" width="18" height="18" rx="5"
        fill="none" stroke="#C4B5FD" stroke-width="2"/>
  <rect x="182" y="316" width="90" height="8" rx="4" fill="#E9D5FF"/>

  <!-- Mic badge (bottom-right of card) -->
  <circle cx="318" cy="358" r="30" fill="url(#micGrad)" filter="url(#shadow)"/>
  <!-- Mic body -->
  <rect x="310" y="336" width="16" height="24" rx="8" fill="white"/>
  <!-- Mic stand arc -->
  <path d="M306,356 Q306,372 318,372 Q330,372 330,356"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Mic pole -->
  <line x1="318" y1="372" x2="318" y2="378"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="312" y1="378" x2="324" y2="378"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Star sparkle top-right -->
  <g transform="translate(368, 112)">
    <polygon points="0,-16 4,-6 14,-6 6,0 9,11 0,5 -9,11 -6,0 -14,-6 -4,-6"
             fill="rgba(255,255,255,0.9)"/>
  </g>

  <!-- Small sparkle top-left -->
  <g transform="translate(144, 148)">
    <polygon points="0,-9 2.5,-3.5 9,-3.5 4,0 5.5,6.5 0,3 -5.5,6.5 -4,0 -9,-3.5 -2.5,-3.5"
             fill="rgba(255,255,255,0.55)"/>
  </g>

  <!-- Tiny dot accent -->
  <circle cx="374" cy="160" r="5" fill="rgba(255,255,255,0.4)"/>
  <circle cx="142" cy="360" r="4" fill="rgba(255,255,255,0.3)"/>
</svg>
