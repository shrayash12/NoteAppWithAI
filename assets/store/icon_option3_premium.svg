<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F0C29"/>
      <stop offset="50%" style="stop-color:#302B63"/>
      <stop offset="100%" style="stop-color:#24243E"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFA500"/>
      <stop offset="100%" style="stop-color:#FF8C00"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="135deg" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.18)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.06)"/>
    </linearGradient>
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A855F7"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
    <linearGradient id="cyanAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#06B6D4"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="goldGlow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Subtle radial glow center -->
  <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:rgba(168,85,247,0.2)"/>
    <stop offset="100%" style="stop-color:rgba(0,0,0,0)"/>
  </radialGradient>
  <rect width="512" height="512" rx="108" fill="url(#centerGlow)"/>

  <!-- Floating star dust -->
  <circle cx="90" cy="90" r="2" fill="white" opacity="0.6"/>
  <circle cx="180" cy="60" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="380" cy="80" r="2" fill="white" opacity="0.5"/>
  <circle cx="440" cy="140" r="1.5" fill="white" opacity="0.4"/>
  <circle cx="70" cy="380" r="1.5" fill="white" opacity="0.35"/>
  <circle cx="450" cy="390" r="2" fill="white" opacity="0.4"/>
  <circle cx="420" cy="280" r="1" fill="white" opacity="0.5"/>
  <circle cx="60" cy="240" r="1.5" fill="white" opacity="0.35"/>

  <!-- Glass card — back right -->
  <g transform="translate(256,265) rotate(8) translate(-88,-112)" filter="url(#cardShadow)">
    <rect width="176" height="224" rx="20"
          fill="url(#cardGrad)"
          stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
    <rect x="0" y="0" width="5" height="224" rx="2.5" fill="url(#purpleAccent)"/>
  </g>

  <!-- Glass card — back left -->
  <g transform="translate(256,265) rotate(-7) translate(-88,-112)" filter="url(#cardShadow)">
    <rect width="176" height="224" rx="20"
          fill="url(#cardGrad)"
          stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
    <rect x="0" y="0" width="5" height="224" rx="2.5" fill="url(#cyanAccent)"/>
  </g>

  <!-- Main glass card -->
  <g transform="translate(168,141)" filter="url(#cardShadow)">
    <rect width="176" height="224" rx="20"
          fill="rgba(255,255,255,0.12)"
          stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <!-- Top gradient bar -->
    <rect x="0" y="0" width="176" height="6" rx="3" fill="url(#goldGrad)"/>

    <!-- Glowing lines -->
    <rect x="18" y="28" width="140" height="6" rx="3" fill="rgba(255,255,255,0.5)"/>
    <rect x="18" y="46" width="110" height="6" rx="3" fill="rgba(255,255,255,0.3)"/>
    <rect x="18" y="64" width="128" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

    <!-- Divider -->
    <rect x="18" y="84" width="140" height="1" rx="0.5" fill="rgba(255,255,255,0.2)"/>

    <!-- Checklist with glow -->
    <rect x="18" y="96" width="14" height="14" rx="4" fill="url(#purpleAccent)"/>
    <polyline points="20,103 24,107 30,98" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="99" width="98" height="6" rx="3" fill="rgba(168,85,247,0.5)"/>

    <rect x="18" y="120" width="14" height="14" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="40" y="123" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

    <rect x="18" y="144" width="14" height="14" rx="4" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
    <rect x="40" y="147" width="108" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

    <rect x="18" y="168" width="14" height="14" rx="4" fill="url(#cyanAccent)"/>
    <polyline points="20,175 24,179 30,170" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="40" y="171" width="70" height="6" rx="3" fill="rgba(6,182,212,0.5)"/>
  </g>

  <!-- Central gold star burst -->
  <g transform="translate(256,256)" filter="url(#goldGlow)">
    <!-- Outer ring glow -->
    <circle cx="0" cy="0" r="52" fill="rgba(255,215,0,0.12)"/>
    <circle cx="0" cy="0" r="38" fill="url(#bg)"/>
    <circle cx="0" cy="0" r="36" fill="url(#goldGrad)"/>
    <!-- Star shape -->
    <polygon points="0,-22 5,-8 20,-8 9,0 13,16 0,8 -13,16 -9,0 -20,-8 -5,-8"
             fill="white"/>
  </g>

  <!-- Gold sparkles around star -->
  <g filter="url(#goldGlow)">
    <g transform="translate(340,176)">
      <line x1="0" y1="-10" x2="0" y2="10" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
      <line x1="-10" y1="0" x2="10" y2="0" stroke="#FFD700" stroke-width="2" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="2.5" fill="#FFD700"/>
    </g>
    <g transform="translate(168,336)">
      <line x1="0" y1="-8" x2="0" y2="8" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="-8" y1="0" x2="8" y2="0" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="2" fill="#FFD700"/>
    </g>
    <circle cx="370" cy="320" r="3" fill="#A855F7" opacity="0.8"/>
    <circle cx="150" cy="190" r="2.5" fill="#06B6D4" opacity="0.7"/>
  </g>
</svg>
